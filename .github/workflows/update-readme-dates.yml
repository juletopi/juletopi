name: Update README dates

on:
  schedule:
    - cron: "0 0 1 * *"     # Runs on the 1st day of every month at midnight
    - cron: "0 0 17 9 *"    # Runs on September 17th at midnight (birthday)
  workflow_dispatch:

jobs:
  update-dates:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Update README dates
        run: |
          BIRTH_DATE="2003-09-17"
          CURRENT_DATE=$(date +%Y-%m-%d)
          
          BIRTH_YEAR=     $(date -d "$BIRTH_DATE" +%Y)
          CURRENT_YEAR=   $(date +%Y)
          AGE=            $((CURRENT_YEAR - BIRTH_YEAR))
          
          BIRTH_MONTH=    $(date -d "$BIRTH_DATE" +%m)
          BIRTH_DAY=      $(date -d "$BIRTH_DATE" +%d)
          CURRENT_MONTH=  $(date +%m)
          CURRENT_DAY=    $(date +%d)
          
          if [ "$CURRENT_MONTH" -lt "$BIRTH_MONTH" ] || \
             ([ "$CURRENT_MONTH" -eq "$BIRTH_MONTH" ] && [ "$CURRENT_DAY" -lt "$BIRTH_DAY" ]); then
            AGE=$((AGE - 1))
          fi
          
          echo "Current age: $AGE"
          
          calculate_duration_en() {
            START_DATE=$1
            END_DATE=$2
            
            START_YEAR=   $(date -d "$START_DATE" +%Y)
            START_MONTH=  $(date -d "$START_DATE" +%m)
            END_YEAR=     $(date -d "$END_DATE" +%Y)
            END_MONTH=    $(date -d "$END_DATE" +%m)
            
            YEARS=  $((END_YEAR - START_YEAR))
            MONTHS= $((END_MONTH - START_MONTH))
            
            if [ $MONTHS -lt 0 ]; then
              YEARS=$((YEARS - 1))
              MONTHS=$((MONTHS + 12))
            fi
            
            if [ $YEARS -eq 0 ]; then
              [ $MONTHS -eq 1 ] && echo "$MONTHS month" || echo "$MONTHS months"
            elif [ $MONTHS -eq 0 ]; then
              [ $YEARS -eq 1 ] && echo "$YEARS year" || echo "$YEARS years"
            else
              YEAR_TEXT="year"
              MONTH_TEXT="month"
              [ $YEARS -gt 1 ] && YEAR_TEXT="years"
              [ $MONTHS -gt 1 ] && MONTH_TEXT="months"
              echo "$YEARS $YEAR_TEXT n' $MONTHS $MONTH_TEXT"
            fi
          }
          
          calculate_duration_pt() {
            START_DATE=$1
            END_DATE=$2
            
            START_YEAR=   $(date -d "$START_DATE" +%Y)
            START_MONTH=  $(date -d "$START_DATE" +%m)
            END_YEAR=     $(date -d "$END_DATE" +%Y)
            END_MONTH=    $(date -d "$END_DATE" +%m)
            
            YEARS=  $((END_YEAR - START_YEAR))
            MONTHS= $((END_MONTH - START_MONTH))
            
            if [ $MONTHS -lt 0 ]; then
              YEARS=$((YEARS - 1))
              MONTHS=$((MONTHS + 12))
            fi
            
            if [ $YEARS -eq 0 ]; then
              [ $MONTHS -eq 1 ] && echo "$MONTHS mês" || echo "$MONTHS meses"
            elif [ $MONTHS -eq 0 ]; then
              [ $YEARS -eq 1 ] && echo "$YEARS ano" || echo "$YEARS anos"
            else
              YEAR_TEXT="ano"
              MONTH_TEXT="mês"
              [ $YEARS -gt 1 ] && YEAR_TEXT="anos"
              [ $MONTHS -gt 1 ] && MONTH_TEXT="meses"
              echo "$YEARS $YEAR_TEXT e $MONTHS $MONTH_TEXT"
            fi
          }
          
          WORK_START="2024-10-01"     # October 2024
          EDU_START="2022-07-01"      # July 2022
          
          WORK_DURATION_EN=$(calculate_duration_en "$WORK_START" "$CURRENT_DATE")
          WORK_DURATION_PT=$(calculate_duration_pt "$WORK_START" "$CURRENT_DATE")
          EDU_DURATION_EN=$(calculate_duration_en "$EDU_START" "$CURRENT_DATE")
          EDU_DURATION_PT=$(calculate_duration_pt "$EDU_START" "$CURRENT_DATE")
          
          echo "Work duration (EN): $WORK_DURATION_EN"
          echo "Work duration (PT): $WORK_DURATION_PT"
          echo "Education duration (EN): $EDU_DURATION_EN"
          echo "Education duration (PT): $EDU_DURATION_PT"
          
          # Update README.md (English)
          sed -i "s/A [0-9]\+ year old brazilian guy/A $AGE year old brazilian guy/g" README.md
          sed -i "s/<i>\*\*October 2024<\/i> - <i>currently now ([^)]\+)<\/i>/<i>**October 2024<\/i> - <i>currently now ($WORK_DURATION_EN)**<\/i>/g" README.md
          sed -i "s/<i>\*\*July 2022<\/i> - <i>currently now ([^)]\+)<\/i>/<i>**July 2022<\/i> - <i>currently now ($EDU_DURATION_EN)**<\/i>/g" README.md
          
          # Update README.pt.md (Portuguese)
          sed -i "s/Um rapaz de [0-9]\+ anos/Um rapaz de $AGE anos/g" README.pt.md
          sed -i "s/<i>\*\*Outubro 2024<\/i> - <i>até o momento ([^)]\+)<\/i>/<i>**Outubro 2024<\/i> - <i>até o momento ($WORK_DURATION_PT)**<\/i>/g" README.pt.md
          sed -i "s/<i>\*\*Julho 2022<\/i> - <i>até o momento ([^)]\+)<\/i>/<i>**Julho 2022<\/i> - <i>até o momento ($EDU_DURATION_PT)**<\/i>/g" README.pt.md
          
          echo "README files updated successfully!"

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet README.md README.pt.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.pt.md
          git commit -m "docs auto-update age and experience durations"
          git push
